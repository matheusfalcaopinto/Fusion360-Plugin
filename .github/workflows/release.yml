name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read

jobs:
  validate-build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Validate tag and package versions
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import ast, json, os, pathlib, re, tomllib
          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("harness/pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          plugin = json.loads(pathlib.Path(".codex-plugin/plugin.json").read_text(encoding="utf-8"))["version"].split("+", 1)[0]
          module = ast.parse(pathlib.Path("harness/apps/fusion_agent_mcp/__init__.py").read_text(encoding="utf-8"))
          module_version = next(
              ast.literal_eval(node.value)
              for node in module.body
              if isinstance(node, ast.Assign)
              and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)
          )
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          changelog_match = re.search(r"(?m)^##\s+" + re.escape(version) + r"(?:\s+-\s+\d{4}-\d{2}-\d{2})?\s*$", changelog)
          if tag != f"v{version}" or plugin != version or module_version != version or not changelog_match:
              raise SystemExit(
                  "release version mismatch: "
                  f"tag={tag} package={version} plugin={plugin} module={module_version} "
                  f"changelog_entry={bool(changelog_match)}"
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          PY
      - name: Require three consecutive real scheduled nightlies
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/check-nightly-release-gate.py --repository "${{ github.repository }}" --commit "${{ github.sha }}"
      - name: Install frozen release environment
        run: |
          python -m pip install "uv==0.11.29"
          python -m uv sync --frozen --project harness --extra test
      - name: Run complete test suite
        run: harness/.venv/bin/python -m pytest -q -p no:cacheprovider
      - name: Compare candidate performance with reviewed baseline
        shell: bash
        env:
          BASELINE_SHA: a148a741bbe7fc89cd1db62df3414db84aff41bd
        run: |
          set -euo pipefail
          baseline_root="$(mktemp -d)"
          git archive --format=tar --output="$RUNNER_TEMP/fusion-agent-baseline.tar" "$BASELINE_SHA"
          tar -xf "$RUNNER_TEMP/fusion-agent-baseline.tar" -C "$baseline_root"
          harness/.venv/bin/python scripts/measure-performance.py --source-root "$baseline_root" --git-commit "$BASELINE_SHA" --output "$RUNNER_TEMP/performance-baseline.json"
          harness/.venv/bin/python scripts/measure-performance.py --source-root . --git-commit "$GITHUB_SHA" --output "$RUNNER_TEMP/performance-candidate.json"
          harness/.venv/bin/python scripts/check-performance-gate.py --baseline "$RUNNER_TEMP/performance-baseline.json" --candidate "$RUNNER_TEMP/performance-candidate.json" --candidate-commit "$GITHUB_SHA"
      - name: Build twice from clean tracked source and compare
        shell: bash
        run: |
          mkdir -p /tmp/fusion-build-a /tmp/fusion-build-b
          git archive HEAD | tar -x -C /tmp/fusion-build-a
          git archive HEAD | tar -x -C /tmp/fusion-build-b
          (cd /tmp/fusion-build-a && "$GITHUB_WORKSPACE/harness/.venv/bin/python" scripts/build-distribution.py)
          (cd /tmp/fusion-build-b && "$GITHUB_WORKSPACE/harness/.venv/bin/python" scripts/build-distribution.py)
          cmp /tmp/fusion-build-a/wheels/*.whl /tmp/fusion-build-b/wheels/*.whl
          cmp /tmp/fusion-build-a/wheels/*.whl wheels/*.whl
      - name: Verify wheel before installation
        run: python scripts/preinstall_verify.py --plugin-root .
      - name: Validate plugin bundle
        run: harness/.venv/bin/python scripts/validate_plugin.py
      - name: Assemble immutable release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp wheels/*.whl release-assets/
          git archive --format=zip --output="release-assets/fusion-agent-codex-${{ steps.version.outputs.version }}.zip" HEAD
          cd release-assets
          sha256sum *.whl *.zip > SHA256SUMS
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fusion-agent-release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: validate-build
    runs-on: ubuntu-latest
    environment: fusion-agent-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: fusion-agent-release-assets
          path: release-assets
      - name: Verify validated asset checksums
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}" release-assets/*
          --repo "${{ github.repository }}"
          --verify-tag
          --generate-notes
          --title "Fusion Agent Codex ${{ needs.validate-build.outputs.version }}"
