name: Fusion real nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusion-real-nightly
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.configuration.outputs.ready }}
      reason: ${{ steps.configuration.outputs.reason }}
      candidate_sha: ${{ steps.configuration.outputs.candidate_sha }}
    steps:
      - id: configuration
        name: Check declared runner and credential availability
        shell: bash
        env:
          NIGHTLY_ENABLED: ${{ vars.FUSION_REAL_NIGHTLY_ENABLED }}
          RUNNER_REGISTERED: ${{ vars.FUSION_REAL_RUNNER_REGISTERED }}
          CREDENTIALS_CONFIGURED: ${{ vars.FUSION_REAL_CREDENTIALS_CONFIGURED }}
          CANDIDATE_SHA: ${{ vars.FUSION_AGENT_RELEASE_CANDIDATE_SHA }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          ready=true
          reasons=()
          [[ "${NIGHTLY_ENABLED,,}" == "true" ]] || { ready=false; reasons+=(nightly_disabled); }
          [[ "${RUNNER_REGISTERED,,}" == "true" ]] || { ready=false; reasons+=(runner_not_registered); }
          [[ "${CREDENTIALS_CONFIGURED,,}" == "true" ]] || { ready=false; reasons+=(credentials_not_configured); }
          candidate_sha="${CANDIDATE_SHA,,}"
          [[ "$candidate_sha" =~ ^[0-9a-f]{40}$ ]] || { ready=false; reasons+=(candidate_sha_invalid); }
          [[ "$EVENT_REF" == "refs/heads/$DEFAULT_BRANCH" ]] || { ready=false; reasons+=(non_default_branch_ref); }
          [[ "$EVENT_SHA" == "$candidate_sha" ]] || { ready=false; reasons+=(candidate_sha_mismatch); }
          reason=$(IFS=,; echo "${reasons[*]}")
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
          echo "reason=${reason:-ready}" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$candidate_sha" >> "$GITHUB_OUTPUT"
      - name: Record honest not-run state
        if: steps.configuration.outputs.ready != 'true'
        shell: bash
        env:
          REASON: ${{ steps.configuration.outputs.reason }}
          TESTED_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p nightly-public
          python -I -S -B -c "import hashlib,json,os,pathlib; root=pathlib.Path('nightly-public'); status={'schema_version':'fusion_real_nightly.v1','status':'not_run','reason':os.environ['REASON'],'tested_commit':os.environ['TESTED_COMMIT'],'fixture_policy':'disposable_unsaved_only','save_user_documents':False}; (root/'nightly-status.json').write_text(json.dumps(status,indent=2,sort_keys=True)+'\n',encoding='utf-8'); summary={'schema_version':'fusion_real_nightly_public.v1','status':'not_run','tested_commit':os.environ['TESTED_COMMIT'],'fixture_policy':'disposable_unsaved_only','save_user_documents':False,'checks':{}}; (root/'summary.json').write_text(json.dumps(summary,indent=2,sort_keys=True)+'\n',encoding='utf-8'); lines=[f'{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}' for path in sorted(root.glob('*.json'))]; (root/'SHA256SUMS').write_text('\n'.join(lines)+'\n',encoding='utf-8')"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: steps.configuration.outputs.ready != 'true'
        with:
          name: fusion-real-nightly-not-run
          path: |
            nightly-public/nightly-status.json
            nightly-public/summary.json
            nightly-public/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  real-fusion:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.sha == needs.preflight.outputs.candidate_sha
    runs-on: [self-hosted, Windows, X64, fusion-real]
    environment: fusion-real-nightly
    timeout-minutes: 180
    outputs:
      run_state: ${{ steps.record_status.outputs.run_state }}
    env:
      FUSION_AGENT_DEFAULT_MODE: real
      FUSION_AGENT_REQUIRE_REAL: "1"
      FUSION_AGENT_ALLOW_DRY_RUN: "0"
      FUSION_AGENT_BACKEND: autodesk_http
      FUSION_AGENT_TELEMETRY: "1"
      GIT_COMMIT: ${{ needs.preflight.outputs.candidate_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.candidate_sha }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Revalidate candidate checkout
        shell: pwsh
        env:
          EXPECTED_SHA: ${{ needs.preflight.outputs.candidate_sha }}
        run: |
          $observed = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($observed -ne $env:EXPECTED_SHA) { throw "Candidate checkout SHA mismatch." }
      - name: Verify wheel and locks before installation
        run: python -I -S -B scripts/preinstall_verify.py --plugin-root .
      - name: Install hash-locked canonical harness
        shell: pwsh
        run: |
          $venvRoot = Join-Path $env:RUNNER_TEMP "fusion-agent-nightly-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          python -I -B -m venv $venvRoot
          $venvPython = Join-Path $venvRoot "Scripts\python.exe"
          & $venvPython -I -S -B scripts/run-isolated-pip.py download --require-hashes --only-binary=:all: --dest .dependency-wheelhouse -r harness/requirements/test.lock
          if ($LASTEXITCODE -ne 0) { throw "Hash-locked nightly dependency download failed." }
          & $venvPython -I -S -B scripts/run-isolated-pip.py install --no-compile --no-index --find-links .dependency-wheelhouse --require-hashes --only-binary=:all: -r harness/requirements/test.lock
          if ($LASTEXITCODE -ne 0) { throw "Hash-locked nightly dependency installation failed." }
          & $venvPython -I -S -B scripts/run-isolated-pip.py install --no-compile --no-deps (Get-ChildItem wheels/fusion_agent_harness-*.whl -File -ErrorAction Stop).FullName
          if ($LASTEXITCODE -ne 0) { throw "Nightly wheel installation failed." }
          (Join-Path $venvRoot "Scripts") | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Verify installed wheel and exact dependency set
        shell: pwsh
        run: |
          python -I -S -B scripts/preinstall_verify.py --plugin-root . --verify-installed --dependency-lock test.lock --dependency-wheelhouse .dependency-wheelhouse
          if ($LASTEXITCODE -ne 0) { throw "Nightly installed-distribution verification failed." }
          python -I -S -B scripts/run-isolated-pip.py check
          if ($LASTEXITCODE -ne 0) { throw "Nightly dependency graph is inconsistent." }
      - name: Prepare isolated artifact directory
        shell: pwsh
        run: |
          Remove-Item -LiteralPath nightly-private -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath nightly-public -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path nightly-private | Out-Null
      - id: runtime_configuration
        name: Confirm runtime configuration on the Fusion runner
        shell: pwsh
        env:
          FUSION_MCP_ENDPOINT: ${{ secrets.FUSION_MCP_ENDPOINT }}
        run: |
          $ready = -not [string]::IsNullOrWhiteSpace($env:FUSION_MCP_ENDPOINT)
          "ready=$($ready.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if (-not $ready) {
            "reason=fusion_mcp_endpoint_missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
      - name: Doctor
        if: steps.runtime_configuration.outputs.ready == 'true'
        shell: pwsh
        env:
          FUSION_MCP_ENDPOINT: ${{ secrets.FUSION_MCP_ENDPOINT }}
          FUSION_MCP_BEARER_TOKEN: ${{ secrets.FUSION_MCP_BEARER_TOKEN }}
        run: |
          & python -I -B -m cli.main doctor *> nightly-private/doctor.json
          if ($LASTEXITCODE -ne 0) {
            throw "Fusion Agent doctor failed; private diagnostics retained on runner."
          }
      - name: Probe real MCP transport
        if: steps.runtime_configuration.outputs.ready == 'true'
        shell: pwsh
        env:
          FUSION_MCP_ENDPOINT: ${{ secrets.FUSION_MCP_ENDPOINT }}
          FUSION_MCP_BEARER_TOKEN: ${{ secrets.FUSION_MCP_BEARER_TOKEN }}
        run: |
          & python -I -B -m cli.main tools probe *> nightly-private/probe.json
          if ($LASTEXITCODE -ne 0) {
            throw "Fusion Agent transport probe failed; private diagnostics retained on runner."
          }
      - id: reference_suite
        name: Run B02-B07 only in disposable unsaved fixtures
        if: steps.runtime_configuration.outputs.ready == 'true'
        shell: pwsh
        env:
          FUSION_AGENT_BENCHMARK_MODE: real
          FUSION_AGENT_BENCHMARK_CONFIRM_REAL: "1"
          FUSION_MCP_ENDPOINT: ${{ secrets.FUSION_MCP_ENDPOINT }}
          FUSION_MCP_BEARER_TOKEN: ${{ secrets.FUSION_MCP_BEARER_TOKEN }}
        run: |
          $revision = (& python -I -B -c "from benchmark.provenance import collect_workspace_revision; print(collect_workspace_revision('.').observed_source_manifest_sha256 or '')").Trim()
          if ($revision -notmatch '^[0-9a-f]{64}$') { throw "Candidate source manifest digest is unavailable." }
          python -I -B benchmark_parametric_suite/run_reference_suite.py --git-commit "${{ github.sha }}" --source-manifest-sha256 $revision --nightly-run-identity "${{ github.run_id }}-${{ github.run_attempt }}" --output-root nightly-private/reference-runs
          if ($LASTEXITCODE -ne 0) { throw "Reference suite failed." }
          $proofs = @(Get-ChildItem -LiteralPath nightly-private/reference-runs -Recurse -Filter reference_suite_result.json -File)
          if ($proofs.Count -ne 1) { throw "Expected exactly one current reference suite proof." }
          "proof_path=$($proofs[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "source_manifest_sha256=$revision" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - name: Create private import-only host I/O policy
        if: steps.runtime_configuration.outputs.ready == 'true'
        shell: pwsh
        run: |
          $privateRoot = (Resolve-Path nightly-private).Path
          $ioRoot = Join-Path $privateRoot "io"
          New-Item -ItemType Directory -Force -Path $ioRoot | Out-Null
          @{
            schema_version = "fusion_agent.authority_policy.v1"
            import_roots = @(
              @{
                id = "nightly-import"
                path = $ioRoot
                formats = @("step", "stp")
                default = $true
              }
            )
            export_roots = @()
            allow_overwrite = $false
            capability_ttl_seconds = 1800
          } | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 (Join-Path $privateRoot "authority-policy.json")
      - id: capability_packs
        name: Run non-experimental CadSpec v2 packs in disposable unsaved fixtures
        if: steps.runtime_configuration.outputs.ready == 'true'
        shell: pwsh
        env:
          FUSION_MCP_ENDPOINT: ${{ secrets.FUSION_MCP_ENDPOINT }}
          FUSION_MCP_BEARER_TOKEN: ${{ secrets.FUSION_MCP_BEARER_TOKEN }}
          FUSION_AGENT_AUTHORITY_POLICY_PATH: ${{ github.workspace }}/nightly-private/authority-policy.json
        run: python -I -B scripts/run-real-capability-packs.py --artifact-root nightly-private
      - id: collect_reference_proof
        name: Collect only the current reference-suite proof
        if: always() && steps.runtime_configuration.outputs.ready == 'true'
        continue-on-error: true
        shell: pwsh
        run: python -I -B scripts/collect-nightly-reference-proof.py --source "${{ steps.reference_suite.outputs.proof_path }}" --destination nightly-private/reference_suite_result.json --expected-commit "${{ github.sha }}" --expected-source-manifest-sha256 "${{ steps.reference_suite.outputs.source_manifest_sha256 }}" --expected-run-identity "${{ github.run_id }}-${{ github.run_attempt }}"
      - id: record_status
        name: Preserve suite artifacts and status
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.collect_reference_proof.outcome }}" -ne "success") {
            Remove-Item -LiteralPath nightly-private/reference_suite_result.json -Force -ErrorAction SilentlyContinue
            $referenceStatus = if ("${{ steps.runtime_configuration.outputs.ready }}" -eq "true") { "failed" } else { "not_run" }
            @{
              schema_version = "fusion_parametric_reference_suite_result.v2"
              status = $referenceStatus
              reason = "current_run_proof_unavailable"
              tested_commit = "${{ github.sha }}"
              nightly_run_identity = "${{ github.run_id }}-${{ github.run_attempt }}"
            } | ConvertTo-Json | Set-Content -Encoding utf8 nightly-private/reference_suite_result.json
          }
          if (-not (Test-Path nightly-private/capability-packs.json)) {
            $capabilityOutcome = "${{ steps.capability_packs.outcome }}"
            $capabilityStatus = if ("${{ steps.runtime_configuration.outputs.ready }}" -ne "true" -or $capabilityOutcome -eq "skipped") {
              "not_run"
            } else {
              "failed"
            }
            $capabilityReason = if ("${{ steps.runtime_configuration.outputs.ready }}" -ne "true") {
              "runtime_configuration_unavailable"
            } elseif ($capabilityOutcome -eq "skipped") {
              "prerequisite_step_failed_or_was_skipped"
            } else {
              "runner_terminated_before_artifact"
            }
            @{
              schema_version = "fusion_real_capability_packs.v1"
              status = $capabilityStatus
              reason = $capabilityReason
              evidence_mode = "not_executed"
              fixture_policy = "disposable_unsaved_only"
              save_user_documents = $false
            } | ConvertTo-Json | Set-Content -Encoding utf8 nightly-private/capability-packs.json
          }
          $workflowStatus = if ("${{ steps.runtime_configuration.outputs.ready }}" -ne "true") {
            "not_run"
          } elseif ("${{ steps.collect_reference_proof.outcome }}" -ne "success") {
            "failed"
          } elseif ("${{ job.status }}" -eq "success") {
            "passed"
          } else {
            "failed"
          }
          $payload = @{
            schema_version = "fusion_real_nightly.v1"
            status = $workflowStatus
            tested_commit = "${{ github.sha }}"
            fixture_policy = "disposable_unsaved_only"
            save_user_documents = $false
          }
          $payload | ConvertTo-Json | Set-Content -Encoding utf8 nightly-private/nightly-status.json
          "run_state=$workflowStatus" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - id: prepare_public
        name: Project fixed public nightly artifacts
        if: always()
        shell: pwsh
        run: python -I -S -B scripts/prepare-nightly-public.py --private-root nightly-private --public-root nightly-public
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && steps.prepare_public.outcome == 'success'
        with:
          name: fusion-real-nightly-status
          path: |
            nightly-public/nightly-status.json
            nightly-public/summary.json
            nightly-public/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  outcome:
    needs: [preflight, real-fusion]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize nightly outcome
        shell: bash
        env:
          READY: ${{ needs.preflight.outputs.ready }}
          REASON: ${{ needs.preflight.outputs.reason }}
          REAL_RESULT: ${{ needs.real-fusion.result }}
          RUN_STATE: ${{ needs.real-fusion.outputs.run_state }}
        run: |
          if [[ "$READY" != "true" ]]; then
            echo "## Fusion real nightly: not_run" >> "$GITHUB_STEP_SUMMARY"
            echo "Reason: $REASON" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$RUN_STATE" == "not_run" ]]; then
            echo "## Fusion real nightly: not_run" >> "$GITHUB_STEP_SUMMARY"
            echo "Reason: runtime configuration unavailable on runner" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$REAL_RESULT" == "success" && "$RUN_STATE" == "passed" ]]; then
            echo "## Fusion real nightly: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Fusion real nightly: failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
