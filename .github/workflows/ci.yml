name: CI

on:
  push:
  pull_request:

jobs:
  canonical-source-and-wheel:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install canonical harness
        run: python -m pip install -e "./harness[test]"
      - name: Unit, fake MCP, linter, route-lock, and benchmark mock tests
        run: python -m pytest -q -p no:cacheprovider
      - name: Build deterministic wheel
        run: python scripts/build-distribution.py
      - name: Require tracked wheel to match canonical sources
        run: git diff --exit-code -- wheels
      - name: Validate plugin bundle
        run: python scripts/validate_plugin.py
      - uses: actions/upload-artifact@v4
        with:
          name: fusion-agent-harness-${{ matrix.os }}
          path: wheels/*.whl

  python-312-packaging-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build deterministic wheel
        run: python scripts/build-distribution.py
      - name: Install bundled wheel
        run: python -m pip install wheels/*.whl
      - name: Smoke installed commands and assets
        run: |
          fusion-agent --help
          python -c "from fusion_agent_assets import asset_root; from fusion_agent_mcp.server import list_tool_definitions; assert list_tool_definitions(); assert (asset_root('benchmarks') / 'public_competitors_v1.json').is_file()"
