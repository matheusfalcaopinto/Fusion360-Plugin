name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  canonical-source-and-wheel:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Verify wheel and dependency locks before installation
        run: python -I -S -B scripts/preinstall_verify.py --plugin-root .
      - name: Install hash-locked test environment
        run: |
          python -I -S -B scripts/run-isolated-pip.py download --require-hashes --only-binary=:all: --dest .dependency-wheelhouse -r harness/requirements/test.lock
          python -I -S -B scripts/run-isolated-pip.py install --no-compile --no-index --find-links .dependency-wheelhouse --require-hashes --only-binary=:all: -r harness/requirements/test.lock
          python -I -S -B scripts/run-isolated-pip.py install --no-compile --no-deps wheels/fusion_agent_harness-0.4.1-py3-none-any.whl
      - name: Verify installed wheel and exact dependency set
        run: |
          python -I -S -B scripts/preinstall_verify.py --plugin-root . --verify-installed --dependency-lock test.lock --dependency-wheelhouse .dependency-wheelhouse
          python -I -S -B scripts/run-isolated-pip.py check
      - name: Run complete test suite
        run: python -B -m pytest -q -p no:cacheprovider
      - name: Build deterministic wheel
        run: python -B scripts/build-distribution.py
      - name: Require tracked wheel to match canonical sources
        run: git diff --exit-code -- wheels
      - name: Reverify rebuilt wheel
        run: python -I -S -B scripts/preinstall_verify.py --plugin-root .
      - name: Validate plugin bundle
        run: python -I -B scripts/validate_plugin.py
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fusion-agent-harness-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheels/*.whl
          if-no-files-found: error
          retention-days: 7

  quality-and-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Verify wheel and dependency locks before quality installation
        run: python -I -S -B scripts/preinstall_verify.py --plugin-root .
      - name: Install frozen quality environment
        run: |
          python -I -S -B scripts/run-isolated-pip.py download --require-hashes --only-binary=:all: --dest .quality-wheelhouse -r harness/requirements/quality.lock
          python -I -S -B scripts/run-isolated-pip.py install --no-compile --no-index --find-links .quality-wheelhouse --require-hashes --only-binary=:all: -r harness/requirements/quality.lock
          python -I -S -B scripts/run-isolated-pip.py install --no-compile --no-deps wheels/fusion_agent_harness-0.4.1-py3-none-any.whl
      - name: Verify frozen quality environment before imports
        run: python -I -S -B scripts/preinstall_verify.py --plugin-root . --verify-installed --dependency-lock quality.lock --dependency-wheelhouse .quality-wheelhouse
      - name: Ruff formatting and lint
        run: |
          python -B -m ruff format --check harness scripts tests
          python -B -m ruff check harness scripts tests
      - name: Compile first-party Python
        run: python -B -m compileall -q harness/apps harness/packages harness/tests scripts tests
      - name: Type-check configured first-party boundaries
        run: python -B -m mypy
      - name: pip-audit and locked dependency checks
        run: |
          python -B -m uv lock --check --project harness
          python -I -S -B scripts/run-isolated-pip.py check
          python -B -m pip_audit -r harness/requirements/quality.lock
      - name: Coverage gate
        run: >-
          python -B -m pytest -q -p no:cacheprovider
          --cov=harness/apps --cov=harness/packages --cov-branch
          --cov-report=term-missing --cov-report=json:coverage.json
          --cov-fail-under=70
      - name: Require 90 percent on critical 0.4.1 boundaries
        run: >-
          python -B scripts/check-coverage-gate.py --coverage-json coverage.json
      - name: Compare candidate performance with reviewed baseline
        shell: bash
        env:
          BASELINE_SHA: a148a741bbe7fc89cd1db62df3414db84aff41bd
        run: |
          set -euo pipefail
          baseline_root="$(mktemp -d)"
          git archive --format=tar --output="$RUNNER_TEMP/fusion-agent-baseline.tar" "$BASELINE_SHA"
          tar -xf "$RUNNER_TEMP/fusion-agent-baseline.tar" -C "$baseline_root"
          python -B scripts/measure-performance.py --source-root "$baseline_root" --git-commit "$BASELINE_SHA" --output "$RUNNER_TEMP/performance-baseline.json"
          python -B scripts/measure-performance.py --source-root . --git-commit "$GITHUB_SHA" --output "$RUNNER_TEMP/performance-candidate.json"
          python -B scripts/check-performance-gate.py --baseline "$RUNNER_TEMP/performance-baseline.json" --candidate "$RUNNER_TEMP/performance-candidate.json" --candidate-commit "$GITHUB_SHA"
      - name: Validate GitHub workflow syntax
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Validate immutable workflow policy
        run: >-
          python -B -m pytest -q tests/test_release_hardening_041.py -k github_actions
